<!-- ko if: getTotal() -->
<!-- ko if: getVoucherList().length > 0 -->
<!-- ko foreach: getVoucherList() -->
<tr class="totals sub voucher-discount">
    <th class="mark" scope="row">
        <!-- ko text: ($data.entry_type || 'Voucher') + ' ' + $t('Redeemed') + ' (' + ($data.entry_no || $data.no || '') + ')' --><!-- /ko -->
        <button type="button"
                class="action action-cancel action-delete"
                style="margin-left: 8px; background: none; border: none; cursor: pointer; color: #e02b27; font-size: 12px; vertical-align: middle;"
                title="Remove"
                data-bind="click: $parent.removeVoucher.bind($parent, $data)">
            <!-- ko i18n: 'Remove'--><!-- /ko -->
        </button>
    </th>
    <td class="amount">
        <span class="price" data-bind="html: $parent.getVoucherAmount($data)"></span>
    </td>
</tr>
<!-- /ko -->
<!-- /ko -->
<!-- ko if: getVoucherList().length === 0 -->
<tr class="totals sub voucher-discount">
    <th class="mark" scope="row">
        <span data-bind="text: getTotal().title"></span>
        <button type="button"
                class="action action-cancel action-delete"
                style="margin-left: 8px; background: none; border: none; cursor: pointer; color: #e02b27; font-size: 12px; vertical-align: middle;"
                title="Remove"
                data-bind="click: cancelAllVouchers.bind($data)">
            <!-- ko i18n: 'Remove'--><!-- /ko -->
        </button>
    </th>
    <td class="amount">
        <span class="price" data-bind="html: getValue()"></span>
    </td>
</tr>
<!-- /ko -->
